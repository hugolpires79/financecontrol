<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Gestor Financeiro</title>
    <!-- Tailwind CSS para o visual -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased" x-data="financeApp()" x-init="init()">

    <div class="max-w-5xl mx-auto p-4 md:p-8 space-y-6" x-cloak>
        
        <!-- CABEÇALHO -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-lg shadow-indigo-200">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-800 tracking-tight italic">FINANÇAS PRO</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Controle Pessoal</p>
                </div>
            </div>
            <div class="bg-white px-6 py-3 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="text-right">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Saldo Total</p>
                    <p class="text-2xl font-black tracking-tight" :class="balance >= 0 ? 'text-indigo-600' : 'text-red-600'" x-text="formatCurrency(balance)"></p>
                </div>
            </div>
        </header>

        <!-- CARDS DE RESUMO -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between group transition-all hover:border-green-200">
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Receitas</p>
                    <h2 class="text-3xl font-black text-green-600 tracking-tight" x-text="formatCurrency(totalIncome)"></h2>
                </div>
                <div class="bg-green-100 p-3 rounded-full text-green-600 group-hover:scale-110 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between group transition-all hover:border-red-200">
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Despesas Totais</p>
                    <h2 class="text-3xl font-black text-red-600 tracking-tight" x-text="formatCurrency(totalExpenses)"></h2>
                </div>
                <div class="bg-red-100 p-3 rounded-full text-red-600 group-hover:scale-110 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>
                </div>
            </div>
        </div>

        <!-- GRID DE SEÇÕES -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- RECEITAS -->
            <div class="md:col-span-2">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-4 border-b bg-green-50/50 border-green-100 flex justify-between items-center">
                        <div class="flex items-center gap-2 text-green-700">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                            <h3 class="font-bold text-xs uppercase tracking-widest">Receitas Mensais</h3>
                        </div>
                        <span class="font-black text-green-700" x-text="formatCurrency(totalIncome)"></span>
                    </div>
                    <div class="p-4">
                        <div class="space-y-1 mb-4 max-h-40 overflow-y-auto custom-scrollbar">
                            <template x-for="item in incomes" :key="item.id">
                                <div class="flex justify-between items-center p-2 hover:bg-slate-50 rounded-xl group transition-all">
                                    <span class="text-sm font-medium text-slate-600" x-text="item.description"></span>
                                    <div class="flex items-center gap-4">
                                        <span class="text-sm font-bold text-slate-900" x-text="formatCurrency(item.amount)"></span>
                                        <button @click="removeItem('incomes', item.id)" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <form @submit.prevent="addItem('incomes')" class="flex gap-2">
                            <input type="text" x-model="forms.incomes.desc" placeholder="Ex: Salário" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                            <input type="number" step="0.01" x-model="forms.incomes.val" placeholder="R$" class="w-24 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                            <button class="bg-green-600 text-white p-2 rounded-xl hover:bg-green-700 transition-colors shadow-sm shadow-green-200">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- CONTAS FIXAS -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 border-b bg-orange-50/50 border-orange-100 flex justify-between items-center text-orange-700">
                    <div class="flex items-center gap-2">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        <h3 class="font-bold text-xs uppercase tracking-widest">Fixas</h3>
                    </div>
                    <span class="font-black" x-text="formatCurrency(totalFixed)"></span>
                </div>
                <div class="p-4">
                    <div class="space-y-1 mb-4 max-h-40 overflow-y-auto custom-scrollbar">
                        <template x-for="item in fixed" :key="item.id">
                            <div class="flex justify-between items-center p-2 hover:bg-slate-50 rounded-xl group">
                                <span class="text-sm font-medium text-slate-600" x-text="item.description"></span>
                                <div class="flex items-center gap-4">
                                    <span class="text-sm font-bold text-slate-900" x-text="formatCurrency(item.amount)"></span>
                                    <button @click="removeItem('fixed', item.id)" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                    <form @submit.prevent="addItem('fixed')" class="flex gap-2">
                        <input type="text" x-model="forms.fixed.desc" placeholder="Ex: Aluguel" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-orange-500 outline-none">
                        <input type="number" step="0.01" x-model="forms.fixed.val" placeholder="R$" class="w-20 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm outline-none">
                        <button class="bg-orange-600 text-white p-2 rounded-xl"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                    </form>
                </div>
            </div>

            <!-- CONTAS VARIÁVEIS -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 border-b bg-red-50/50 border-red-100 flex justify-between items-center text-red-700">
                    <div class="flex items-center gap-2">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                        <h3 class="font-bold text-xs uppercase tracking-widest">Variáveis</h3>
                    </div>
                    <span class="font-black" x-text="formatCurrency(totalVariable)"></span>
                </div>
                <div class="p-4">
                    <div class="space-y-1 mb-4 max-h-40 overflow-y-auto custom-scrollbar">
                        <template x-for="item in variable" :key="item.id">
                            <div class="flex justify-between items-center p-2 hover:bg-slate-50 rounded-xl group">
                                <span class="text-sm font-medium text-slate-600" x-text="item.description"></span>
                                <div class="flex items-center gap-4">
                                    <span class="text-sm font-bold text-slate-900" x-text="formatCurrency(item.amount)"></span>
                                    <button @click="removeItem('variable', item.id)" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                    <form @submit.prevent="addItem('variable')" class="flex gap-2">
                        <input type="text" x-model="forms.variable.desc" placeholder="Ex: Mercado" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-red-500 outline-none">
                        <input type="number" step="0.01" x-model="forms.variable.val" placeholder="R$" class="w-20 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm outline-none">
                        <button class="bg-red-600 text-white p-2 rounded-xl"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                    </form>
                </div>
            </div>

            <!-- CARTÃO DE CRÉDITO -->
            <div class="md:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 border-b bg-blue-50/50 border-blue-100 flex justify-between items-center text-blue-700">
                    <div class="flex items-center gap-2">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                        <h3 class="font-bold text-xs uppercase tracking-widest">Cartão de Crédito</h3>
                    </div>
                    <span class="font-black" x-text="formatCurrency(totalCredit)"></span>
                </div>
                <div class="p-4">
                    <div class="space-y-1 mb-4 max-h-48 overflow-y-auto custom-scrollbar">
                        <template x-for="item in credit" :key="item.id">
                            <div class="flex justify-between items-center p-2 hover:bg-slate-50 rounded-xl group">
                                <span class="text-sm font-medium text-slate-600" x-text="item.description"></span>
                                <div class="flex items-center gap-4">
                                    <span class="text-sm font-bold text-slate-900" x-text="formatCurrency(item.amount)"></span>
                                    <button @click="removeItem('credit', item.id)" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                    <form @submit.prevent="addItem('credit')" class="flex gap-2">
                        <input type="text" x-model="forms.credit.desc" placeholder="Ex: Fatura Nubank" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="number" step="0.01" x-model="forms.credit.val" placeholder="R$" class="w-24 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm outline-none">
                        <button class="bg-blue-600 text-white p-2 rounded-xl shadow-sm shadow-blue-200"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                    </form>
                </div>
            </div>

        </div>

        <footer class="text-center py-8">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Dados salvos automaticamente no seu dispositivo</p>
        </footer>
    </div>

    <script>
        // Definimos a função de lógica antes de carregar o Alpine.js
        function financeApp() {
            return {
                incomes: [],
                fixed: [],
                variable: [],
                credit: [],
                forms: {
                    incomes: { desc: '', val: '' },
                    fixed: { desc: '', val: '' },
                    variable: { desc: '', val: '' },
                    credit: { desc: '', val: '' }
                },
                
                init() {
                    // Carrega dados do LocalStorage
                    this.incomes = JSON.parse(localStorage.getItem('fin_incomes')) || [];
                    this.fixed = JSON.parse(localStorage.getItem('fin_fixed')) || [];
                    this.variable = JSON.parse(localStorage.getItem('fin_variable')) || [];
                    this.credit = JSON.parse(localStorage.getItem('fin_credit')) || [];

                    // Watchers manuais para salvar no localStorage
                    this.$watch('incomes', val => localStorage.setItem('fin_incomes', JSON.stringify(val)));
                    this.$watch('fixed', val => localStorage.setItem('fin_fixed', JSON.stringify(val)));
                    this.$watch('variable', val => localStorage.setItem('fin_variable', JSON.stringify(val)));
                    this.$watch('credit', val => localStorage.setItem('fin_credit', JSON.stringify(val)));
                },

                get totalIncome() { return this.incomes.reduce((a, b) => a + Number(b.amount), 0); },
                get totalFixed() { return this.fixed.reduce((a, b) => a + Number(b.amount), 0); },
                get totalVariable() { return this.variable.reduce((a, b) => a + Number(b.amount), 0); },
                get totalCredit() { return this.credit.reduce((a, b) => a + Number(b.amount), 0); },
                get totalExpenses() { return this.totalFixed + this.totalVariable + this.totalCredit; },
                get balance() { return this.totalIncome - this.totalExpenses; },

                addItem(category) {
                    const form = this.forms[category];
                    if (!form.desc || !form.val) return;
                    
                    this[category].push({
                        id: Date.now(),
                        description: form.desc,
                        amount: parseFloat(form.val)
                    });

                    form.desc = '';
                    form.val = '';
                },

                removeItem(category, id) {
                    this[category] = this[category].filter(i => i.id !== id);
                },

                formatCurrency(value) {
                    return new Intl.NumberFormat('pt-BR', {
                        style: 'currency',
                        currency: 'BRL'
                    }).format(value || 0);
                }
            }
        }
    </script>
    <!-- Carregamos o Alpine.js por último para garantir que a função financeApp() já exista -->
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</body>
</html>
